<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AMFL Турнир — Класиране</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --night:#0E1A2B;
    --card:#16263D;
    --card-2:#1D3050;
    --line:#2A3F5F;
    --gold:#E3B23C;
    --gold-dim:#9C7A2E;
    --text:#EAF0FA;
    --text-dim:#8FA3C2;
    --win:#4CAF6D;
    --draw:#E3B23C;
    --loss:#E2574C;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--night);
    color:var(--text);
    font-family:'Inter',sans-serif;
    padding:0 0 4rem;
  }
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px;}
  header.top{
    padding:2.5rem 20px 1.5rem;
    text-align:center;
    border-bottom:1px solid var(--line);
    margin-bottom:1.5rem;
  }
  header.top h1{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:2px;
    font-size:2.6rem;
    margin:0;
    color:var(--gold);
  }
  header.top p{color:var(--text-dim);margin:.3rem 0 0;font-size:.9rem;}
  nav.tabs{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:1.75rem;
  }
  nav.tabs button{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:1px;
    font-size:1.05rem;
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-dim);
    padding:.5rem 1.1rem;
    border-radius:999px;
    cursor:pointer;
  }
  nav.tabs button.active{
    background:var(--gold);
    color:var(--night);
    border-color:var(--gold);
  }
  .live-dot{
    display:inline-block;
    width:8px;
    height:8px;
    border-radius:50%;
    background:#e2574c;
    margin-left:.4rem;
    vertical-align:middle;
    animation:live-pulse 1.4s ease-in-out infinite;
  }
  @keyframes live-pulse{
    0%{box-shadow:0 0 0 0 rgba(226,87,76,.6);}
    70%{box-shadow:0 0 0 7px rgba(226,87,76,0);}
    100%{box-shadow:0 0 0 0 rgba(226,87,76,0);}
  }
  h2.section{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:1.5px;
    font-size:1.5rem;
    color:var(--gold);
    margin:2.2rem 0 .8rem;
  }
  .group-block{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:1.1rem 1.2rem 1.3rem;
    margin-bottom:1.3rem;
  }
  .group-block h3{
    margin:0 0 .8rem;
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:1px;
    font-size:1.2rem;
    color:var(--text);
  }
  table.standings{
    width:100%;
    border-collapse:collapse;
    font-size:.85rem;
  }
  table.standings th{
    text-align:center;
    color:var(--text-dim);
    font-weight:600;
    padding:.35rem .3rem;
    border-bottom:1px solid var(--line);
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:.5px;
  }
  table.standings th:first-child, table.standings td:first-child{
    text-align:left;
    padding-left:.7rem;
    border-left:3px solid transparent;
  }
  table.standings td{
    text-align:center;
    padding:.4rem .3rem;
    font-family:'Roboto Mono',monospace;
    font-size:.82rem;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  table.standings tr.q-main td:first-child{border-left-color:var(--win);}
  table.standings tr.q-second td:first-child{border-left-color:var(--draw);}
  table.standings td.pts{color:var(--gold);font-weight:700;}
  table.standings td.team{font-family:'Inter',sans-serif;font-weight:500;color:var(--text);}
  .legend{display:flex;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:var(--text-dim);margin:.6rem 0 0;}
  .legend span{display:inline-flex;align-items:center;gap:.4rem;}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;}
  .dot.win{background:var(--win);} .dot.draw{background:var(--draw);}

  .matches-grid{display:flex;flex-direction:column;gap:.5rem;}
  .round-label{font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin:.7rem 0 .3rem;}
  .match-row{
    background:var(--card-2);
    border-radius:8px;
    padding:.45rem .6rem .55rem;
  }
  .match-score-row{
    display:grid;
    grid-template-columns:1fr 46px 16px 46px 1fr;
    align-items:center;
    gap:.5rem;
  }
  .match-row .when{
    text-align:center;
    font-size:.68rem;
    color:var(--text-dim);
    margin-top:.3rem;
    letter-spacing:.3px;
  }
  .match-row.match-live{
    border:1px solid rgba(226,87,76,.5);
    background:linear-gradient(180deg, rgba(226,87,76,.08), var(--card-2));
  }
  .on-pitch{
    display:inline-flex;
    align-items:center;
    color:#e2574c;
    font-weight:600;
    letter-spacing:.5px;
  }
  .on-pitch .live-dot{margin-left:0;margin-right:.4rem;}
  .match-row .home{text-align:right;font-size:.85rem;}
  .match-row .away{text-align:left;font-size:.85rem;}
  .match-row .vs{text-align:center;color:var(--text-dim);font-size:.75rem;}
  .match-row input{
    width:46px;
    text-align:center;
    background:var(--night);
    border:1px solid var(--line);
    color:var(--text);
    border-radius:6px;
    font-family:'Roboto Mono',monospace;
    font-size:.9rem;
    padding:.3rem 0;
  }
  .match-row input:focus{outline:2px solid var(--gold);border-color:var(--gold);}

  .cup-block{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:1.1rem 1.2rem;
    margin-bottom:1.3rem;
  }
  .cup-block h3{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:1px;
    font-size:1.25rem;
    margin:0 0 .9rem;
    color:var(--gold);
  }
  .slot-list{display:flex;flex-direction:column;gap:.4rem;}
  .slot{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:.6rem;
    background:var(--card-2);
    border-radius:8px;
    padding:.5rem .7rem;
    font-size:.88rem;
  }
  .slot .team{font-weight:500;}
  .slot .vs-label{color:var(--text-dim);font-size:.76rem;}
  .slot .why{color:var(--text-dim);font-size:.76rem;margin-left:auto;}
  .yt-embed-wrap{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    border-radius:8px;
    overflow:hidden;
    background:var(--night);
  }
  .yt-embed-wrap iframe{
    position:absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    border:0;
  }

  .elim-wrap{
    display:flex;
    gap:44px;
    margin-top:1rem;
    overflow-x:auto;
    padding-bottom:.5rem;
  }
  .elim-round{
    display:flex;
    flex-direction:column;
    min-width:190px;
  }
  .elim-round-title{
    font-family:'Bebas Neue',sans-serif;
    letter-spacing:1px;
    font-size:.95rem;
    color:var(--text-dim);
    text-align:center;
    margin-bottom:.7rem;
  }
  .elim-col{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-around;
    gap:14px;
  }
  .match-card{
    position:relative;
    background:var(--card-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:.5rem .7rem .6rem;
    min-height:64px;
  }
  .elim-round:not(:last-child) .match-card::after{
    content:"";
    position:absolute;
    top:50%;
    right:-22px;
    width:22px;
    height:1px;
    background:var(--line);
  }
  .elim-round:not(:first-child) .match-card::before{
    content:"";
    position:absolute;
    top:50%;
    left:-22px;
    width:22px;
    height:1px;
    background:var(--line);
  }
  .mc-status{
    font-size:.66rem;
    color:var(--gold-dim);
    text-transform:uppercase;
    letter-spacing:.4px;
    margin-bottom:.35rem;
  }
  .mc-team{
    font-size:.83rem;
    padding:.4rem .55rem;
    color:var(--text);
    background:var(--night);
    border:1px solid var(--line);
    border-radius:7px;
    margin-top:.35rem;
    box-sizing:border-box;
    height:2.15rem;
    display:flex;
    align-items:center;
  }

  .elim-round{position:relative;}
  .third-place{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
  }
  .third-place .elim-round-title{margin-bottom:.5rem;}
  .third-place .match-card{min-height:auto;}
  .note{
    font-size:.78rem;
    color:var(--text-dim);
    background:var(--card-2);
    border-left:3px solid var(--gold-dim);
    padding:.6rem .8rem;
    border-radius:0 8px 8px 0;
    margin:.8rem 0 0;
  }
  .footer-note{text-align:center;color:var(--text-dim);font-size:.72rem;margin-top:2rem;}
  @media(max-width:520px){
    .match-score-row{grid-template-columns:1fr 40px 14px 40px 1fr;}
    table.standings{font-size:.72rem;}
  }
</style>
</head>
<body>

const initialData = {

    {round:3, date:"24.07", time:"21:00", home:"Арсенал Трошево", away:"ФК Братухи", hs:null, as:null},

function computeStandings(group){
  const stats = {};
  group.teams.forEach(t => stats[t] = {team:t, M:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0});
  group.matches.forEach(m => {
    if(m.hs===null || m.as===null || m.hs==="" || m.as==="") return;
    const hs = Number(m.hs), as = Number(m.as);
    const h = stats[m.home], a = stats[m.away];
    h.M++; a.M++;
    h.GF += hs; h.GA += as;
    a.GF += as; a.GA += hs;
    if(hs>as){ h.W++; h.Pts+=3; a.L++; }
    else if(hs<as){ a.W++; a.Pts+=3; h.L++; }
    else { h.D++; a.D++; h.Pts+=1; a.Pts+=1; }
  });
  Object.values(stats).forEach(s => s.GD = s.GF - s.GA);
  return Object.values(stats).sort((x,y) =>
    y.Pts - x.Pts || y.GD - x.GD || y.GF - x.GF || x.team.localeCompare(y.team)
  );
}

function rankPool(pool){
  return [...pool].sort((x,y) =>
    y.Pts - x.Pts || y.GD - x.GD || y.GF - x.GF || x.team.localeCompare(y.team)
  );
}

const GROUP_KEYS = ["A","B","C","D","E"];
const GROUP_LABEL = {A:"А", B:"Б", C:"В", D:"Г", E:"Д"};

const TEAM_FLAG = {
  "FC Fullmax":"🇵🇹",
  "АФК Абсолют":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "ФК Ново Оряхово":"🇫🇷",
  "МФК Стройгранд":"🇲🇦",
  "МФК Феникс":"🇳🇴",
  "Спейс Тийм":"🇪🇸",
  "Сивите Гъски":"🇯🇵",
  "Тигрите от Младост":"🇦🇷",
  "МФК Балерини":"🇩🇪",
  "ФК Дружба":"🇨🇻",
  "Сборка 17":"🇭🇹",
  "ФК Финт":"🇧🇷",
  "The Unity":"🇨🇮",
  "MFC TNT":"🇨🇼",
  "ФК Ария":"🇲🇽",
  "ФК Владислав":"🇧🇪",
  "МФК Импакт":"🏴󠁧󠁢󠁥󠁮󠁧󠁿",
  "МФК Валекс":"🇸🇳",
  "Арсенал Трошево":"🇨🇴",
  "ФК Братухи":"🇭🇷",
};
const flagFor = team => TEAM_FLAG[team] ? TEAM_FLAG[team]+" " : "";

function Standings({data}){
  const allStandings = {};
  GROUP_KEYS.forEach(k => allStandings[k] = computeStandings(data[k]));

  const runnersUp = rankPool(GROUP_KEYS.map(k => allStandings[k][1]));
  const bestRunners = runnersUp.slice(0,3).map(r=>r.team);
  const fourths = rankPool(GROUP_KEYS.map(k => allStandings[k][3]));
  const bestFourth = fourths[0] ? fourths[0].team : null;

  return (
    <div>
      {GROUP_KEYS.map(k => {
        const st = allStandings[k];
        return (
          <div className="group-block" key={k}>
            <h3>{data[k].name}</h3>
            <table className="standings">
              <thead>
                <tr>
                  <th>Отбор</th><th>М</th><th>П</th><th>Р</th><th>З</th>
                  <th>ВГ</th><th>ДГ</th><th>ГР</th><th>Т</th>
                </tr>
              </thead>
              <tbody>
                {st.map((row,i) => {
                  const cls = i===0 ? "q-main" : (i===1 && bestRunners.includes(row.team)) ? "q-main" : (i===1 ? "q-second" : (i===2 ? "q-second" : (i===3 && row.team===bestFourth ? "q-second" : "")));
                  return (
                    <tr key={row.team} className={cls}>
                      <td className="team">{flagFor(row.team)}{row.team}</td>
                      <td>{row.M}</td><td>{row.W}</td><td>{row.D}</td><td>{row.L}</td>
                      <td>{row.GF}</td><td>{row.GA}</td>
                      <td>{row.GD>0?`+${row.GD}`:row.GD}</td>
                      <td className="pts">{row.Pts}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div className="legend">
              <span><i className="dot win"></i>Шампионски поток</span>
              <span><i className="dot draw"></i>Купа Втори Шанс</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function isMatchLive(m){
  if(m.hs!==null || m.as!==null) return false;
  const [dd,mm] = (m.date||"01.01").split(".").map(Number);
  const [hh,min] = (m.time||"00:00").split(":").map(Number);
  const start = new Date(TOURNAMENT_YEAR, mm-1, dd, hh, min).getTime();
  const now = Date.now();
  return now >= start && now <= start + 70*60*1000;
}

function Matches({data, setData}){
  const [, forceTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => forceTick(t=>t+1), 30000);
    return () => clearInterval(id);
  }, []);

  const updateScore = (gk, idx, field, value) => {
    const v = value === "" ? null : value.replace(/[^0-9]/g,"");
    setData(prev => {
      const copy = {...prev};
      const matches = copy[gk].matches.map((m,i) => i===idx ? {...m,[field]: v===null?null:(v===""?null:v)} : m);
      copy[gk] = {...copy[gk], matches};
      return copy;
    });
  };

  return (
    <div>
      {GROUP_KEYS.map(gk => {
        const g = data[gk];
        const rounds = [1,2,3];
        return (
          <div className="group-block" key={gk}>
            <h3>{g.name}</h3>
            <div className="matches-grid">
              {rounds.map(r => (
                <div key={r}>
                  <div className="round-label">Кръг {r}</div>
                  {g.matches.map((m, idx) => {
                    if(m.round !== r) return null;
                    const live = isMatchLive(m);
                    return (
                      <div className={"match-row"+(live?" match-live":"")} key={idx}>
                        <div className="match-score-row">
                          <div className="home">{flagFor(m.home)}{m.home}</div>
                          <input type="text" inputMode="numeric" value={m.hs===null?"":m.hs}
                            onChange={e=>updateScore(gk, idx, "hs", e.target.value)} />
                          <div className="vs">:</div>
                          <input type="text" inputMode="numeric" value={m.as===null?"":m.as}
                            onChange={e=>updateScore(gk, idx, "as", e.target.value)} />
                          <div className="away">{flagFor(m.away)}{m.away}</div>
                        </div>
                        <div className="when">
                          {live ? (
                            <span className="on-pitch"><span className="live-dot"></span>На терена</span>
                          ) : (
                            <>{m.date} · {m.time}</>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Qualification({data}){
  const allStandings = {};
  GROUP_KEYS.forEach(k => allStandings[k] = computeStandings(data[k]));

  const winners = GROUP_KEYS.map(k => ({...allStandings[k][0], group:k}));
  const runners = GROUP_KEYS.map(k => ({...allStandings[k][1], group:k}));
  const thirds = GROUP_KEYS.map(k => ({...allStandings[k][2], group:k}));
  const fourths = GROUP_KEYS.map(k => ({...allStandings[k][3], group:k}));

  const runnersRanked = rankPool(runners);
  const bestRunners = runnersRanked.slice(0,3);
  const restRunners = runnersRanked.slice(3);
  const fourthsRanked = rankPool(fourths);
  const bestFourth = fourthsRanked[0];
  const restFourths = fourthsRanked.slice(1);

  const mainCup = [
    ...winners.map(t=>({...t, why:`1-во място, Гр. ${GROUP_LABEL[t.group]}`})),
    ...bestRunners.map(t=>({...t, why:`Най-добър втори (Гр. ${GROUP_LABEL[t.group]})`})),
  ];
  const secondChance = [
    ...restRunners.map(t=>({...t, why:`2-ро място, Гр. ${GROUP_LABEL[t.group]}`})),
    ...thirds.map(t=>({...t, why:`3-то място, Гр. ${GROUP_LABEL[t.group]}`})),
    ...(bestFourth ? [{...bestFourth, why:`Най-добър четвърти (Гр. ${GROUP_LABEL[bestFourth.group]})`}] : []),
  ];

  const renderSlots = list => (
    <div className="slot-list">
      {list.map((t,i) => (
        <div className="slot" key={i}>
          <span className="team">{flagFor(t.team)}{t.team}</span>
          <span className="why">{t.why}</span>
        </div>
      ))}
    </div>
  );

  const placementTable = (list, label) => {
    const ranked = rankPool(list);
    return (
      <div className="group-block">
        <h3>{label}</h3>
        <table className="standings">
          <thead>
            <tr><th>Отбор</th><th>Гр.</th><th>М</th><th>Т</th><th>ГР</th><th>ВГ</th></tr>
          </thead>
          <tbody>
            {ranked.map((row,i) => (
              <tr key={row.team}>
                <td className="team">{flagFor(row.team)}{row.team}</td>
                <td>{GROUP_LABEL[row.group]}</td>
                <td>{row.M}</td>
                <td className="pts">{row.Pts}</td>
                <td>{row.GD>0?`+${row.GD}`:row.GD}</td>
                <td>{row.GF}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  };

  return (
    <div>
      <h2 className="section" style={{marginTop:0}}>Класиране по места</h2>
      {placementTable(winners, "Всички първи места")}
      {placementTable(runners, "Всички втори места")}
      {placementTable(thirds, "Всички трети места")}
      {placementTable(fourths, "Всички четвърти места")}

      <h2 className="section">Разпределение по турнири</h2>
      <div className="cup-block">
        <h3>Шампионски поток</h3>
        {renderSlots(mainCup)}
      </div>
      <div className="cup-block">
        <h3>Купа Втори Шанс</h3>
        {renderSlots(secondChance)}
      </div>
    </div>
  );
}

function EliminationTree({title}){
  const qf = [
    {a:"", b:""},
    {a:"", b:""},
    {a:"", b:""},
    {a:"", b:""},
  ];
  const sf = [
    {a:"Победител 1/4-финал 1", b:"Победител 1/4-финал 2"},
    {a:"Победител 1/4-финал 3", b:"Победител 1/4-финал 4"},
  ];
  const final = [{a:"Победител полуфинал 1", b:"Победител полуфинал 2"}];
  const third = {a:"Загубил полуфинал 1", b:"Загубил полуфинал 2"};

  const Card = ({m, pending}) => (
    <div className="match-card">
      <div className="mc-status">{pending}</div>
      <div className={"mc-team"+(m.a?"":" mc-team-empty")}><span>{m.a}</span></div>
      <div className={"mc-team"+(m.b?"":" mc-team-empty")}><span>{m.b}</span></div>
    </div>
  );

  return (
    <div className="cup-block">
      <h3>{title}</h3>
      <div className="elim-wrap">
        <div className="elim-round">
          <div className="elim-round-title">Четвъртфинали</div>
          <div className="elim-col">
            {qf.map((m,i)=><Card m={m} key={i} pending="Очаква жребий" />)}
          </div>
        </div>
        <div className="elim-round">
          <div className="elim-round-title">Полуфинали</div>
          <div className="elim-col elim-col-sf">
            {sf.map((m,i)=><Card m={m} key={i} pending="Очаква 1/4-финал" />)}
          </div>
        </div>
        <div className="elim-round">
          <div className="elim-round-title">Финал</div>
          <div className="elim-col elim-col-final">
            {final.map((m,i)=><Card m={m} key={i} pending="Очаква полуфинал" />)}
          </div>
          <div className="third-place">
            <div className="elim-round-title">Мач за 3-то място</div>
            <Card m={third} pending="Очаква полуфинал" />
          </div>
        </div>
      </div>
    </div>
  );
}

function Bracket(){
  return (
    <div>
      <EliminationTree title="Елиминации — Шампионски поток" />
      <EliminationTree title="Елиминации — Купа Втори Шанс" />
    </div>
  );
}

const YOUTUBE_CHANNEL_ID = "UCsjB8kn8RDwBJTc2NOPPeCA";
const TOURNAMENT_YEAR = 2026;

function findNextMatch(data){
  const now = new Date();
  const all = [];
  GROUP_KEYS.forEach(gk => {
    data[gk].matches.forEach(m => {
      if(m.hs===null || m.as===null){
        const [dd,mm] = (m.date||"01.01").split(".").map(Number);
        const [hh,min] = (m.time||"00:00").split(":").map(Number);
        const dt = new Date(TOURNAMENT_YEAR, mm-1, dd, hh, min);
        all.push({...m, group:gk, dt});
      }
    });
  });
  all.sort((a,b)=>a.dt-b.dt);
  // First choice: the earliest unplayed match that hasn't started yet (real clock time)
  const upcoming = all.find(m => m.dt.getTime() > now.getTime());
  if(upcoming) return upcoming;
  // Fallback: everything unplayed is already in the past (results not entered yet) —
  // just show the earliest one still missing a score.
  return all[0] || null;
}

function LiveTab({data}){
  const next = findNextMatch(data);
  return (
    <div>
      <div className="cup-block">
        <h3>На живо от AMFL</h3>
        <div className="yt-embed-wrap">
          <iframe
            src={`https://www.youtube.com/embed/live_stream?channel=${YOUTUBE_CHANNEL_ID}&autoplay=0`}
            title="AMFL YouTube Live"
            frameBorder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowFullScreen
          ></iframe>
        </div>
        <div className="note">Ако в момента няма активно излъчване, плеърът по-горе ще го покаже автоматично, щом стартира.</div>
      </div>
      <div className="cup-block">
        <h3>Следващ мач</h3>
        {next ? (
          <div className="slot-list">
            <div className="slot">
              <span className="team">{flagFor(next.home)}{next.home}</span>
              <span className="vs-label">срещу</span>
              <span className="team">{flagFor(next.away)}{next.away}</span>
              <span className="why">{data[next.group].name} · {next.date} · {next.time}</span>
            </div>
          </div>
        ) : (
          <div className="note">Всички мачове от груповата фаза са изиграни.</div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [data, setData] = useState(initialData);
  const [tab, setTab] = useState("matches");

  return (
    <div className="wrap">
      <header className="top">
        <h1>AMFL Zero Zero World Cup 2026</h1>
        <p>Групова фаза · Основна купа + Купа "Втори шанс"</p>
      </header>
      <nav className="tabs">
        <button className={tab==="live"?"active":""} onClick={()=>setTab("live")}>Live</button>
        <button className={tab==="matches"?"active":""} onClick={()=>setTab("matches")}>Резултати</button>
        <button className={tab==="standings"?"active":""} onClick={()=>setTab("standings")}>Класиране</button>
        <button className={tab==="qual"?"active":""} onClick={()=>setTab("qual")}>Класирали се</button>
        <button className={tab==="bracket"?"active":""} onClick={()=>setTab("bracket")}>Плейофи</button>
      </nav>
      {tab==="live" && <LiveTab data={data} />}
      {tab==="matches" && <Matches data={data} setData={setData} />}
      {tab==="standings" && <Standings data={data} />}
      {tab==="qual" && <Qualification data={data} />}
      {tab==="bracket" && <Bracket />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
